name: cdads_flutter
description: "Chalk Digital Ad SDK Flutter plugin — Banner, Interstitial, MREC, Native and Rewarded Video ads with background location tracking."
version: 4.0.0
homepage: https://www.chalkdigital.com

environment:
  sdk: ^3.6.1
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^22.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.chalkdigital.cdads
        pluginClass: CdadsFlutterPlugin
      ios:
        pluginClass: CdadsFlutterPlugin
